<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS_CORE // UI_UX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #00e5ff; --p-up: #00ff66; --p-sp: #00e5ff; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- TRANSITION SYSTEM --- */
        #page-transition { position: fixed; inset: 0; background: #000; z-index: 99999; pointer-events: none; opacity: 0; display: flex; justify-content: center; align-items: center; font-family: 'JetBrains Mono'; color: var(--accent); transition: opacity 0.3s ease; }
        #page-transition.active { opacity: 1; background: repeating-linear-gradient(0deg, #000, #000 2px, #0a0a0a 2px, #0a0a0a 4px); animation: transitionGlitch 0.2s infinite; }
        @keyframes transitionGlitch { 0% { transform: skew(0deg); } 50% { transform: skew(2deg); filter: hue-rotate(90deg); } 100% { transform: skew(-1deg); } }

        /* --- UNIFIED NAV --- */
        nav.terminal-nav { position: fixed; top: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 9000; box-sizing: border-box; }
        .nav-links { display: flex; gap: 20px; font-family: 'JetBrains Mono'; font-size: 11px; }
        .nav-links a { color: #555; text-decoration: none; transition: 0.3s; }
        .nav-links a.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .nav-links a:hover { color: #fff; }
        .btn-index { font-family: 'JetBrains Mono'; font-size: 11px; color: #fff; text-decoration: none; border: 1px solid #333; padding: 5px 15px; border-radius: 4px; }

        /* --- CONTENT --- */
        #dynamic-bg { position: fixed; inset: 0; z-index: -1; }
        .blob { position: absolute; width: 800px; height: 800px; filter: blur(150px); border-radius: 50%; opacity: 0.3; transition: 1.5s; }
        section { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 5%; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 100px; max-width: 1400px; }
        h2 { font-size: 5rem; font-weight: 900; line-height: 0.85; letter-spacing: -4px; margin: 0; }
        .quote { font-style: italic; color: var(--accent); border-left: 2px solid var(--accent); padding-left: 20px; margin: 30px 0; }
        .mockup-3d { width: 300px; height: 600px; background: #050505; border: 10px solid #1a1a1a; border-radius: 45px; transform: rotateY(-20deg); box-shadow: 50px 50px 100px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="page-transition"><div id="transition-status">INITIALIZING_UX_MODULE...</div></div>

    <nav class="terminal-nav">
        <a href="new.html" class="transition-link btn-index">← CORE_INDEX</a>
        <div class="nav-links">
            <a href="ui_ux.html" class="transition-link active">UI_UX</a>
            <a href="motion.html" class="transition-link">MOTION</a>
            <a href="3d.html" class="transition-link">3D_LAB</a>
            <a href="psx.html" class="transition-link">GAMING</a>
        </div>
    </nav>

    <div id="dynamic-bg">
        <div class="blob" id="blob1" style="background: var(--p-up); top: -10%; left: -10%;"></div>
        <div class="blob" id="blob2" style="background: var(--p-sp); bottom: -10%; right: -10%;"></div>
    </div>

    <section>
        <div class="container">
            <div class="text-content">
                <p style="font-family:'JetBrains Mono'; color:var(--p-up)">// CASE_STUDY_01</p>
                <h2>RE-LIFE<br>UPCYCLE.</h2>
                <p class="quote">"Fai o non fare, non c'è provare."</p>
                <p>Un ecosistema digitale per la sostenibilità urbana.</p>
            </div>
            <div class="mockup-3d"></div>
        </div>
    </section>

    <script>
        // Transition Logic
        document.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('page-transition');
            overlay.classList.add('active');
            setTimeout(() => overlay.classList.remove('active'), 400);
            document.querySelectorAll('.transition-link').forEach(link => {
                link.addEventListener('click', e => {
                    e.preventDefault();
                    overlay.classList.add('active');
                    setTimeout(() => window.location.href = link.href, 400);
                });
            });
        });
    </script>
</body>
</html>
