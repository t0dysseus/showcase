<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS_CORE // GAMING</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d001a; --accent: #bf00ff; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; }

        /* --- TRANSITION SYSTEM --- */
        #page-transition { position: fixed; inset: 0; background: #000; z-index: 99999; pointer-events: none; opacity: 0; display: flex; justify-content: center; align-items: center; font-family: 'JetBrains Mono'; color: var(--accent); transition: opacity 0.3s ease; }
        #page-transition.active { opacity: 1; background: repeating-linear-gradient(0deg, #000, #000 2px, #0a0a0a 2px, #0a0a0a 4px); animation: transitionGlitch 0.2s infinite; }

        /* --- UNIFIED NAV --- */
        nav.terminal-nav { position: fixed; top: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--accent); z-index: 9000; box-sizing: border-box; }
        .nav-links { display: flex; gap: 20px; font-size: 11px; }
        .nav-links a { color: #444; text-decoration: none; transition: 0.3s; }
        .nav-links a.active { color: var(--accent); }
        .btn-index { font-size: 10px; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); padding: 5px 15px; }

        /* --- PSX CONTENT --- */
        body::before { content: ""; position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%); background-size: 100% 4px; pointer-events: none; z-index: 1000; }
        main { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pixel-title { font-family: 'Press Start 2P', cursive; font-size: 3vw; color: var(--accent); text-shadow: 4px 4px #000; margin-bottom: 50px; }
        .render-box { width: 300px; height: 300px; border: 4px solid #333; background: #000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px rgba(191,0,255,0.2); }
    </style>
</head>
<body>
    <div id="page-transition"><div id="transition-status">LOADING_GAME_STATE...</div></div>

    <nav class="terminal-nav">
        <a href="new.html" class="transition-link btn-index">MEMORY_CARD_01</a>
        <div class="nav-links">
            <a href="ui_ux.html" class="transition-link">UI_UX</a>
            <a href="motion.html" class="transition-link">MOTION</a>
            <a href="3d.html" class="transition-link">3D_LAB</a>
            <a href="psx.html" class="transition-link active">GAMING</a>
        </div>
    </nav>

    <main>
        <h1 class="pixel-title">LOST_SECTOR_V1</h1>
        <div class="render-box">
            <div style="width:100px; height:100px; border:2px solid var(--accent); animation: rot 4s linear infinite;"></div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('page-transition');
            overlay.classList.add('active');
            setTimeout(() => overlay.classList.remove('active'), 400);
            document.querySelectorAll('.transition-link').forEach(link => {
                link.addEventListener('click', e => {
                    e.preventDefault();
                    overlay.classList.add('active');
                    setTimeout(() => window.location.href = link.href, 400);
                });
            });
        });
    </script>
    <style>@keyframes rot { 100% { transform: rotate(360deg); } }</style>
</body>
</html>
