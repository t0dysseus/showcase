<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS_CORE // MOTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #ff2a2a; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- TRANSITION SYSTEM --- */
        #page-transition { position: fixed; inset: 0; background: #000; z-index: 99999; pointer-events: none; opacity: 0; display: flex; justify-content: center; align-items: center; font-family: 'JetBrains Mono'; color: var(--accent); transition: opacity 0.3s ease; }
        #page-transition.active { opacity: 1; background: repeating-linear-gradient(0deg, #000, #000 2px, #0a0a0a 2px, #0a0a0a 4px); animation: transitionGlitch 0.2s infinite; }
        @keyframes transitionGlitch { 0% { transform: skew(0deg); } 50% { transform: skew(2deg); filter: hue-rotate(90deg); } 100% { transform: skew(-1deg); } }

        /* --- UNIFIED NAV --- */
        nav.terminal-nav { position: fixed; top: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,42,42,0.2); z-index: 9000; box-sizing: border-box; }
        .nav-links { display: flex; gap: 20px; font-family: 'JetBrains Mono'; font-size: 11px; }
        .nav-links a { color: #555; text-decoration: none; transition: 0.3s; }
        .nav-links a.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .btn-index { font-family: 'JetBrains Mono'; font-size: 11px; color: #fff; text-decoration: none; border: 1px solid #333; padding: 5px 15px; border-radius: 4px; }

        /* --- MOTION CONTENT --- */
        #timeline-bg { position: fixed; inset: 0; background-image: linear-gradient(90deg, rgba(255,42,42,0.05) 1px, transparent 1px); background-size: 3vw 100%; z-index: -1; }
        section { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .video-wrapper { width: 70vw; height: 40vw; background: #111; border-left: 3px solid var(--accent); position: relative; }
        .floating-text { position: absolute; font-size: 10vw; font-weight: 900; color: transparent; -webkit-text-stroke: 1px var(--accent); top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>
    <div id="page-transition"><div id="transition-status">BUFFERING_MOTION_DATA...</div></div>
    
    <nav class="terminal-nav">
        <a href="new.html" class="transition-link btn-index">← CORE_INDEX</a>
        <div class="nav-links">
            <a href="ui_ux.html" class="transition-link">UI_UX</a>
            <a href="motion.html" class="transition-link active">MOTION</a>
            <a href="3d.html" class="transition-link">3D_LAB</a>
            <a href="psx.html" class="transition-link">GAMING</a>
        </div>
    </nav>

    <div id="timeline-bg"></div>
    <section>
        <div class="video-wrapper">
            <div class="floating-text">KINETIC</div>
        </div>
        <p style="font-family:'JetBrains Mono'; margin-top:40px; color:var(--accent)">[ PRESS_SCROLL_TO_SCRUB ]</p>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('page-transition');
            overlay.classList.add('active');
            setTimeout(() => overlay.classList.remove('active'), 400);
            document.querySelectorAll('.transition-link').forEach(link => {
                link.addEventListener('click', e => {
                    e.preventDefault();
                    overlay.classList.add('active');
                    setTimeout(() => window.location.href = link.href, 400);
                });
            });
        });
    </script>
</body>
</html>
